<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲專案規格書控制台</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-color: #3498db;
            --bg-color: #2c3e50;
        }
        body { margin: 0; font-family: "Microsoft JhengHei", sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* 左側邊欄 */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header { padding: 20px; font-size: 1.2em; font-weight: bold; border-bottom: 1px solid #3e4f5f; text-align: center; }

        /* 選單樣式 */
        .menu { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
        .menu-item { border-bottom: 1px solid #3e4f5f; }
        
        /* 第一層：大標題 */
        .category-title {
            padding: 15px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #34495e;
            font-weight: bold;
        }
        .category-title:hover { background: #3d566e; }
        .category-title::after { content: '▼'; font-size: 0.8em; }

        /* 第二層：子目錄 */
        .submenu { list-style: none; padding: 0; display: none; background: #1a252f; }
        .submenu li a {
            padding: 12px 40px;
            display: block;
            color: #bdc3c7;
            text-decoration: none;
            font-size: 0.95em;
            transition: 0.2s;
        }
        .submenu li a:hover { color: white; background: var(--primary-color); }

        /* 控制下拉顯示 */
        .menu-item.active .submenu { display: block; }
        .menu-item.active .category-title::after { content: '▲'; }

        /* 右側內容區 */
        .content { flex: 1; background: #f9f9f9; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .placeholder {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #95a5a6; text-align: center;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">🎮 遊戲設計規格庫</div>
    <ul class="menu">
        
        <li class="menu-item">
            <div class="category-title" onclick="toggleMenu(this)">遊戲後台設定工具</div>
            <ul class="submenu">
                <li><a href="RTP_設定系統_規格書_v1.1.html" target="content-frame">活動 RTP 設定工具</a></li>
                <li><a href="Pool_Values.html" target="content-frame">水池數值工具</a></li>
            </ul>
        </li>

        <li class="menu-item">
            <div class="category-title" onclick="toggleMenu(this)">CRM 規格</div>
            <ul class="submenu">
                <li><a href="CRM_Proposal.html" target="content-frame">CRM 提案</a></li>
                <li><a href="CRM_MVP.html" target="content-frame">CRM MVP 版本提案</a></li>
            </ul>
        </li>

    </ul>
</div>

<div class="content">
    <div id="placeholder" class="placeholder">
        <h2>請從左側選擇要查看的規格書</h2>
        <p>點擊選單後，文件將顯示在此區域</p>
    </div>
    <iframe name="content-frame" id="content-frame" onload="hidePlaceholder()"></iframe>
</div>

<script>
    // 點擊展開/收合選單
    function toggleMenu(element) {
        const parent = element.parentElement;
        parent.classList.toggle('active');
    }

    // 當點擊連結後，隱藏中央的提示字
    function hidePlaceholder() {
        const iframe = document.getElementById('content-frame');
        const placeholder = document.getElementById('placeholder');
        if (iframe.src !== "about:blank" && iframe.src !== "") {
            placeholder.style.display = 'none';
        }
    }
</script>

</body>
</html>
